services:
  postgres:
    image: postgres:16-alpine
    container_name: ramaniya-postgres
    environment:
      POSTGRES_USER: ramaniya_user
      POSTGRES_PASSWORD: ramaniya_password
      POSTGRES_DB: ramaniya_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ramaniya_user -d ramaniya_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ramaniya-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
